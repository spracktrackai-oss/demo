<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

body{
margin:0;
background:black;
color:white;
font-family:system-ui;
overflow:hidden;
}

video{
position:fixed;
width:100%;
height:100%;
object-fit:cover;
}

canvas{
position:fixed;
width:100%;
height:100%;
}

.header{
position:fixed;
top:0;
width:100%;
text-align:center;
padding:12px;
font-size:20px;
background:linear-gradient(black,transparent);
}

.instructions{
position:fixed;
bottom:140px;
width:100%;
text-align:center;
font-size:18px;
padding:0 20px;
}

.controls{
position:fixed;
bottom:20px;
width:100%;
display:flex;
justify-content:center;
gap:40px;
}

button{
border:none;
border-radius:50%;
width:70px;
height:70px;
font-size:20px;
background:rgba(255,255,255,0.2);
color:white;
}

.record{
background:red;
width:90px;
height:90px;
}

</style>

</head>

<body>

<div class="header">RackTrack Capture</div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div id="instructions" class="instructions">

Press record to start

</div>

<div class="controls">

<button id="flip">🔄</button>
<button id="record" class="record"></button>
<button id="pause">⏸</button>

</div>
<script>

const video=document.getElementById("video")
const instructions=document.getElementById("instructions")

const recordBtn=document.getElementById("record")
const pauseBtn=document.getElementById("pause")
const flipBtn=document.getElementById("flip")

let stream
let recorder
let chunks=[]

let recording=false
let paused=false

let state="idle"

let rackTimer=null
let rotateTimer=null
let scanTimer=null

let usingFront=false

function isPortrait(){
return screen.orientation.type.includes("portrait")
}

function isLandscape(){
return screen.orientation.type.includes("landscape")
}

async function startCamera(){

if(stream){
stream.getTracks().forEach(t=>t.stop())
}

stream=await navigator.mediaDevices.getUserMedia({
video:{facingMode:usingFront?"user":"environment"},
audio:false
})

video.srcObject=stream

recorder=new MediaRecorder(stream)

recorder.ondataavailable=e=>chunks.push(e.data)

recorder.onstop=()=>{

let blob=new Blob(chunks,{type:"video/webm"})
let url=URL.createObjectURL(blob)

let a=document.createElement("a")
a.href=url
a.download="racktrack.webm"
a.click()

}

}

startCamera()

flipBtn.onclick=async()=>{
usingFront=!usingFront
await startCamera()
}

recordBtn.onclick=()=>{

if(!recording){

chunks=[]
recorder.start()

recording=true
state="rack"

rackTimer=null

recordBtn.innerText="■"

instructions.innerText="Hold rack vertically"

}else{

recorder.stop()

recording=false
state="idle"

recordBtn.innerText="●"

instructions.innerText="Recording stopped"

}

}

pauseBtn.onclick=()=>{

if(!recording) return

paused=!paused

if(paused){

state="paused"
instructions.innerText="Move to next unit then press Resume"

}else{

startScan()

}

}

function startScan(){

state="scan"
scanTimer=Date.now()

instructions.innerText="Move camera LEFT → RIGHT"

}

function update(){

if(!recording){
requestAnimationFrame(update)
return
}

if(state==="rack"){

if(isPortrait()){

if(!rackTimer){
rackTimer=Date.now()
}

if(Date.now()-rackTimer>4000){

state="rotate"
instructions.innerText="Rotate phone horizontally"

}

}else{

rackTimer=null
instructions.innerText="Hold phone vertically"

}

}

else if(state==="rotate"){

if(isLandscape()){

if(!rotateTimer){
rotateTimer=Date.now()
}

if(Date.now()-rotateTimer>2000){

startScan()

}

}else{

rotateTimer=null

}

}

else if(state==="scan"){

let t=Date.now()-scanTimer

if(t<3000){

instructions.innerText="Scanning unit"

}else{

state="waitpause"
instructions.innerText="Pause recording and move to next unit"

}

}

requestAnimationFrame(update)

}

update()

</script>
  
</body>

</html>
