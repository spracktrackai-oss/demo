<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Video with Guidance</title>
<style>
  body { display: flex; flex-direction: column; align-items: center; font-family: sans-serif; }
  video { border: 2px solid #333; width: 640px; height: 480px; }
  canvas { position: absolute; top: 0; left: 0; pointer-events: none; }
  #container { position: relative; width: 640px; height: 480px; }
  #controls { margin-top: 10px; }
</style>
</head>
<body>

<h2>Live Camera with Guidance Overlay</h2>
<div id="container">
    <video id="video" autoplay playsinline></video>
    <canvas id="overlay" width="640" height="480"></canvas>
</div>
<div id="controls">
    <button id="startRecord">Start Recording</button>
    <button id="stopRecord" disabled>Stop Recording</button>
    <a id="downloadLink" style="display:none">Download Video</a>
</div>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('overlay');
const ctx = canvas.getContext('2d');
let mediaRecorder;
let recordedChunks = [];

// 1️⃣ Access user camera
navigator.mediaDevices.getUserMedia({ video: true, audio: true })
.then(stream => {
    video.srcObject = stream;

    // Setup MediaRecorder
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = e => {
        if (e.data.size > 0) recordedChunks.push(e.data);
    };
    mediaRecorder.onstop = saveVideo;
})
.catch(err => alert('Camera access error: ' + err));

// 2️⃣ Draw guidance overlay
function drawOverlay() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Example: a center rectangle guide
    ctx.strokeStyle = 'red';
    ctx.lineWidth = 3;
    ctx.strokeRect(220, 140, 200, 200);

    // Example text instructions
    ctx.font = '20px Arial';
    ctx.fillStyle = 'yellow';
    ctx.fillText('Keep object inside the box', 180, 120);

    requestAnimationFrame(drawOverlay);
}
drawOverlay();

// 3️⃣ Recording controls
document.getElementById('startRecord').onclick = () => {
    recordedChunks = [];
    mediaRecorder.start();
    document.getElementById('startRecord').disabled = true;
    document.getElementById('stopRecord').disabled = false;
};

document.getElementById('stopRecord').onclick = () => {
    mediaRecorder.stop();
    document.getElementById('startRecord').disabled = false;
    document.getElementById('stopRecord').disabled = true;
};

// 4️⃣ Save video
function saveVideo() {
    const blob = new Blob(recordedChunks, { type: 'video/webm' });
    const url = URL.createObjectURL(blob);
    const link = document.getElementById('downloadLink');
    link.href = url;
    link.download = 'recorded_video.webm';
    link.style.display = 'inline';
    link.textContent = 'Download Video';
}
</script>

</body>
</html>
