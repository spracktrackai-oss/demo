<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RackTrack Capture</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:system-ui;
overflow:hidden;
}

video{
position:fixed;
width:100%;
height:100%;
object-fit:cover;
}

canvas{
position:fixed;
width:100%;
height:100%;
pointer-events:none;
}

.header{
position:fixed;
top:0;
width:100%;
text-align:center;
padding:14px;
font-size:20px;
font-weight:600;
background:linear-gradient(black,transparent);
}

.instructions{
position:fixed;
bottom:140px;
width:100%;
text-align:center;
font-size:18px;
padding:10px;
}

.controls{
position:fixed;
bottom:30px;
width:100%;
display:flex;
justify-content:center;
gap:40px;
}

button{
border:none;
border-radius:50%;
width:60px;
height:60px;
font-size:22px;
background:rgba(255,255,255,0.2);
color:white;
}

.record{
background:red;
width:80px;
height:80px;
}

.warning{
color:#ff5050;
}

.ok{
color:#00ff88;
}

</style>
</head>

<body>

<div class="header">RackTrack</div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div id="instructions" class="instructions">
Press record to start
</div>

<div class="controls">

<button id="flip">🔄</button>
<button id="record" class="record">●</button>
<button id="pause">⏸</button>

</div>

<script>

let video=document.getElementById("video")
let canvas=document.getElementById("canvas")
let ctx=canvas.getContext("2d")

let instructions=document.getElementById("instructions")

let recordBtn=document.getElementById("record")
let pauseBtn=document.getElementById("pause")
let flipBtn=document.getElementById("flip")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let usingFront=false
let stream
let recorder
let chunks=[]

let recording=false
let paused=false

let phase="idle"

let rackStart=null
let rotateStart=null
let scanStart=null

let prevFrame=null
let prevCenter=null

async function startCamera(){

if(stream){
stream.getTracks().forEach(t=>t.stop())
}

stream=await navigator.mediaDevices.getUserMedia({
video:{facingMode: usingFront?"user":"environment"},
audio:false
})

video.srcObject=stream

recorder=new MediaRecorder(stream)

recorder.ondataavailable=e=>{
chunks.push(e.data)
}

recorder.onstop=()=>{

let blob=new Blob(chunks,{type:"video/webm"})
let url=URL.createObjectURL(blob)

let a=document.createElement("a")
a.href=url
a.download="racktrack_capture.webm"
a.click()

}

}

startCamera()

flipBtn.onclick=()=>{
usingFront=!usingFront
startCamera()
}

recordBtn.onclick=()=>{

if(!recording){

chunks=[]
recorder.start()

recording=true
phase="rack"

rackStart=null

recordBtn.innerText="■"

instructions.innerText="Hold rack vertically"

}else{

recorder.stop()

recording=false
phase="idle"

recordBtn.innerText="●"

instructions.innerText="Recording stopped"

}

}

pauseBtn.onclick=()=>{

if(!recording)return

paused=!paused

if(paused){

instructions.innerText="Move to next unit then resume"

}else{

phase="scan"
scanStart=Date.now()
prevFrame=null

instructions.innerText="Move camera LEFT → RIGHT"

}

}

function isPortrait(){
return window.innerHeight>window.innerWidth
}

function isLandscape(){
return window.innerWidth>window.innerHeight
}

function detectPan(){

if(!prevFrame){

prevFrame=ctx.getImageData(0,0,canvas.width,canvas.height)
return true

}

let frame=ctx.getImageData(0,0,canvas.width,canvas.height)

let movementX=0
let samples=0

for(let i=0;i<frame.data.length;i+=40){

let diff=frame.data[i]-prevFrame.data[i]

movementX+=diff
samples++

}

movementX/=samples

prevFrame=frame

if(Math.abs(movementX)<0.5){

instructions.innerText="Move camera LEFT → RIGHT"
scanStart=Date.now()
return false

}

if(movementX<0){

instructions.innerText="Move camera LEFT → RIGHT"
scanStart=Date.now()
return false

}

return true

}

function drawGuide(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.strokeStyle="rgba(0,255,150,0.6)"
ctx.lineWidth=3

let w=canvas.width*0.7
let h=canvas.height*0.8

ctx.strokeRect(
canvas.width/2-w/2,
canvas.height/2-h/2,
w,
h
)

ctx.font="20px system-ui"
ctx.fillStyle="white"

if(phase==="scan"){

ctx.fillText("→",canvas.width*0.9,canvas.height/2)

}

}

function update(){

drawGuide()

if(!recording){
requestAnimationFrame(update)
return
}

let now=Date.now()

// RACK CAPTURE
if(phase==="rack"){

if(!isPortrait()){

instructions.innerText="Hold phone vertically"
rackStart=null
requestAnimationFrame(update)
return

}

if(!rackStart){
rackStart=now
}

if(now-rackStart<4000){

instructions.innerText="Hold rack vertically"

}else{

phase="rotate"
instructions.innerText="Rotate phone horizontally"

}

}

// ROTATE
else if(phase==="rotate"){

if(!isLandscape()){

instructions.innerText="Rotate phone horizontally"
rotateStart=null
requestAnimationFrame(update)
return

}

if(!rotateStart){
rotateStart=now
}

if(now-rotateStart>2000){

phase="scan"
scanStart=now
prevFrame=null

instructions.innerText="Move camera LEFT → RIGHT"

}

}

// SCAN
else if(phase==="scan"){

if(!isLandscape()){

instructions.innerText="Hold phone horizontally"
scanStart=now
requestAnimationFrame(update)
return

}

ctx.drawImage(video,0,0,canvas.width,canvas.height)

let valid=detectPan()

if(!valid){
requestAnimationFrame(update)
return
}

if(now-scanStart<3000){

instructions.innerText="Scanning unit"

}else{

phase="waitpause"
instructions.innerText="Pause recording and move to next unit"

}

}

// WAIT FOR PAUSE
else if(phase==="waitpause"){

}

requestAnimationFrame(update)

}

update()

</script>

</body>
</html>
