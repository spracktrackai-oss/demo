<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

body{
margin:0;
background:black;
color:white;
font-family:system-ui;
overflow:hidden;
}

video{
position:fixed;
width:100%;
height:100%;
object-fit:cover;
}

canvas{
position:fixed;
width:100%;
height:100%;
}

.header{
position:fixed;
top:0;
width:100%;
text-align:center;
padding:12px;
font-size:20px;
background:linear-gradient(black,transparent);
}

.instructions{
position:fixed;
bottom:140px;
width:100%;
text-align:center;
font-size:18px;
padding:0 20px;
}

.controls{
position:fixed;
bottom:20px;
width:100%;
display:flex;
justify-content:center;
gap:40px;
}

button{
border:none;
border-radius:50%;
width:70px;
height:70px;
font-size:20px;
background:rgba(255,255,255,0.2);
color:white;
}

.record{
background:red;
width:90px;
height:90px;
}

</style>

</head>

<body>

<div class="header">RackTrack Capture</div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div id="instructions" class="instructions">

Press record to start

</div>

<div class="controls">

<button id="flip">🔄</button>
<button id="record" class="record"></button>
<button id="pause">⏸</button>

</div>
<script>

let video=document.getElementById("video")
let instructions=document.getElementById("instructions")

let recordBtn=document.getElementById("record")
let pauseBtn=document.getElementById("pause")
let flipBtn=document.getElementById("flip")

let usingFront=false
let stream
let recorder
let chunks=[]

let recording=false
let paused=false

let phase="idle"

let rackStart=0
let panStart=0

function isVertical(){
return screen.orientation.type.includes("portrait")
}

function isHorizontal(){
return screen.orientation.type.includes("landscape")
}

async function startCamera(){

if(stream){
stream.getTracks().forEach(t=>t.stop())
}

stream=await navigator.mediaDevices.getUserMedia({
video:{facingMode:usingFront?"user":"environment"},
audio:false
})

video.srcObject=stream

recorder=new MediaRecorder(stream)

recorder.ondataavailable=e=>{
chunks.push(e.data)
}

recorder.onstop=()=>{

let blob=new Blob(chunks,{type:"video/webm"})

let url=URL.createObjectURL(blob)

let a=document.createElement("a")
a.href=url
a.download="racktrack.webm"
a.click()

}

}

startCamera()

flipBtn.onclick=async ()=>{

usingFront=!usingFront
await startCamera()

}

recordBtn.onclick=()=>{

if(!recording){

chunks=[]
recorder.start()

recording=true
phase="rack"

rackStart=Date.now()

recordBtn.style.background="gray"

instructions.innerText="Hold rack vertically for 2 seconds"

}else{

recorder.stop()

recording=false
phase="idle"

recordBtn.style.background="red"

instructions.innerText="Recording stopped"

}

}

pauseBtn.onclick=()=>{

if(!recording) return

paused=!paused

if(paused){

instructions.innerText="Move to NEXT UNIT then press Resume"

}else{

instructions.innerText="Move camera LEFT → RIGHT"

phase="pan"

panStart=Date.now()

}

}

function update(){

if(!recording){
requestAnimationFrame(update)
return
}

let now=Date.now()

if(phase==="rack"){

if(isVertical()){

let t=(now-rackStart)/1000

instructions.innerText="Vertical OK… "+(2-Math.floor(t))+"s"

if(t>2){

phase="rotate"

instructions.innerText="Rotate phone horizontally"

}

}else{

instructions.innerText="Hold phone vertically"

}

}

else if(phase==="rotate"){

if(isHorizontal()){

phase="pan"

panStart=Date.now()

instructions.innerText="Move camera LEFT → RIGHT for unit"

}

}

else if(phase==="pan"){

let t=(now-panStart)/1000

if(t>3){

instructions.innerText="3 seconds done. Press PAUSE"

}

}

requestAnimationFrame(update)

}

update()

</script>
  
</body>

</html>
