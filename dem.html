<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RackTrack Guided Capture</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:system-ui;
overflow:hidden;
}

video{
position:fixed;
width:100%;
height:100%;
object-fit:cover;
}

canvas{
position:fixed;
width:100%;
height:100%;
}

.header{
position:fixed;
top:0;
width:100%;
text-align:center;
padding:12px;
font-size:20px;
background:linear-gradient(black,transparent);
}

.instructions{
position:fixed;
bottom:140px;
width:100%;
text-align:center;
font-size:18px;
}

.controls{
position:fixed;
bottom:20px;
width:100%;
display:flex;
justify-content:center;
gap:40px;
}

button{
border:none;
border-radius:50%;
width:60px;
height:60px;
font-size:22px;
background:rgba(255,255,255,0.2);
color:white;
}

.record{
background:red;
width:80px;
height:80px;
}

</style>

</head>

<body>

<div class="header">RackTrack</div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div id="instructions" class="instructions">
Align full rack vertically
</div>

<div class="controls">

<button id="flip">🔄</button>
<button id="record" class="record"></button>
<button id="pause">⏸</button>

</div>

<script>

let video=document.getElementById("video")
let canvas=document.getElementById("canvas")
let ctx=canvas.getContext("2d")

let recordBtn=document.getElementById("record")
let pauseBtn=document.getElementById("pause")
let flipBtn=document.getElementById("flip")
let instructions=document.getElementById("instructions")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let usingFront=false
let stream
let recorder
let chunks=[]

let recording=false
let paused=false

let phase="rack"   // rack → rotate → scan
let rackStartTime=0
let scanStartTime=0

let prevX=null

async function startCamera(){

stream=await navigator.mediaDevices.getUserMedia({
video:{facingMode: usingFront?"user":"environment"},
audio:false
})

video.srcObject=stream

recorder=new MediaRecorder(stream)

recorder.ondataavailable=e=>{
chunks.push(e.data)
}

recorder.onstop=()=>{
let blob=new Blob(chunks,{type:'video/webm'})
let url=URL.createObjectURL(blob)
let a=document.createElement("a")
a.href=url
a.download="racktrack.webm"
a.click()
}

}

startCamera()

flipBtn.onclick=()=>{
usingFront=!usingFront
startCamera()
}

recordBtn.onclick=()=>{

if(recording) return

chunks=[]
recorder.start()
recording=true
rackStartTime=Date.now()

instructions.innerText="Capture full rack vertically (5s)"

}

pauseBtn.onclick=()=>{

if(!recording) return

paused=!paused

if(paused){

instructions.innerText="Paused. Move to next unit then resume"

}else{

scanStartTime=Date.now()
instructions.innerText="Scan unit LEFT → RIGHT"

}

}

function isPortrait(){
	return window.innerHeight > window.innerWidth;
}

function update(){
	drawGuide();
	if(!recording){
		requestAnimationFrame(update);
		return;
	}
	let now = Date.now();
	if(phase === "rack"){
		if(!isPortrait()){
			rackStartTime = null;
			instructions.innerText = "Hold phone vertically";
			return;
		}
		if(!rackStartTime){
			rackStartTime = Date.now();
		}
		let elapsed = Date.now() - rackStartTime;
		if(elapsed < 4000){
			instructions.innerText = "Hold rack vertically";
		}else{
			phase = "rotate";
			rackStartTime = null;
			instructions.innerText = "Rotate phone horizontally";
		}
	}
	else if(phase === "rotate"){
		if(window.innerWidth > window.innerHeight){
			phase = "scan";
			scanStartTime = Date.now();
			instructions.innerText = "Scan unit LEFT → RIGHT";
		}
	}
	else if(phase === "scan"){
		detectMotion();
		let elapsed = (now - scanStartTime) / 1000;
		if(elapsed > 3){
			paused = true;
			instructions.innerText = "✔ Unit captured. Move to next unit then resume";
		}
	}
	requestAnimationFrame(update);
}
if(phase==="rack"){

let elapsed=(now-rackStartTime)/1000

if(window.innerHeight>window.innerWidth){

instructions.innerText="✔ Vertical OK. Hold rack for "+(5-Math.floor(elapsed))+"s"

}else{

instructions.innerText="⚠ Hold phone vertically"

}

if(elapsed>5){

phase="rotate"

instructions.innerText="Rotate phone horizontally"

}

}

else if(phase==="rotate"){

if(window.innerWidth>window.innerHeight){

phase="scan"

scanStartTime=Date.now()

instructions.innerText="Scan unit LEFT → RIGHT"

}

}

else if(phase==="scan"){

detectMotion()

let elapsed=(now-scanStartTime)/1000

if(elapsed>3){

paused=true

instructions.innerText="✔ Unit captured. Move to next unit then resume"

}

}

requestAnimationFrame(update)



update()

</script>

</body>
</html>
