<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RackTrack Guided Capture</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:system-ui;
overflow:hidden;
}

video{
position:fixed;
width:100%;
height:100%;
object-fit:cover;
}

canvas{
position:fixed;
width:100%;
height:100%;
}

.header{
position:fixed;
top:0;
width:100%;
text-align:center;
padding:12px;
font-size:20px;
background:linear-gradient(black,transparent);
}

.instructions{
position:fixed;
bottom:140px;
width:100%;
text-align:center;
font-size:18px;
}

.controls{
position:fixed;
bottom:20px;
width:100%;
display:flex;
justify-content:center;
gap:40px;
}

button{
border:none;
border-radius:50%;
width:60px;
height:60px;
font-size:22px;
background:rgba(255,255,255,0.2);
color:white;
}

.record{
background:red;
width:80px;
height:80px;
}

</style>

</head>

<body>

<div class="header">RackTrack</div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div id="instructions" class="instructions">
Align full rack vertically
</div>

<div class="controls">

<button id="flip">🔄</button>
<button id="record" class="record"></button>
<button id="pause">⏸</button>

</div>

<script>

let video=document.getElementById("video")
let instructions=document.getElementById("instructions")

let recordBtn=document.getElementById("record")
let pauseBtn=document.getElementById("pause")
let flipBtn=document.getElementById("flip")

let usingFront=false
let stream
let recorder
let chunks=[]

let recording=false
let paused=false

let phase="rack"

let rackStartTime=null
let rotateStartTime=null
let scanStartTime=null

async function startCamera(){

if(stream){
stream.getTracks().forEach(t=>t.stop())
}

stream=await navigator.mediaDevices.getUserMedia({
video:{facingMode: usingFront?"user":"environment"},
audio:false
})

video.srcObject=stream

recorder=new MediaRecorder(stream)

recorder.ondataavailable=e=>{
chunks.push(e.data)
}

recorder.onstop=()=>{
let blob=new Blob(chunks,{type:'video/webm'})
let url=URL.createObjectURL(blob)
let a=document.createElement("a")
a.href=url
a.download="racktrack.webm"
a.click()
}

}

startCamera()

flipBtn.onclick=()=>{
usingFront=!usingFront
startCamera()
}

recordBtn.onclick=()=>{

if(!recording){

chunks=[]
recorder.start()

recording=true
phase="rack"
rackStartTime=null

recordBtn.innerText="■"

instructions.innerText="Hold rack vertically"

}else{

recorder.stop()
recording=false

recordBtn.innerText="●"

instructions.innerText="Recording stopped"

}

}

pauseBtn.onclick=()=>{

if(!recording) return

paused=!paused

if(paused){

instructions.innerText="Move to next unit then press Resume"

}else{

phase="scan"
scanStartTime=Date.now()

instructions.innerText="Move camera LEFT → RIGHT"

}

}

function isPortrait(){
return window.innerHeight > window.innerWidth
}

function isLandscape(){
return window.innerWidth > window.innerHeight
}

function update(){

if(!recording){
requestAnimationFrame(update)
return
}

let now=Date.now()

// ---- RACK CAPTURE ----
if(phase==="rack"){

if(!isPortrait()){

rackStartTime=null
instructions.innerText="Hold phone vertically"
requestAnimationFrame(update)
return

}

if(!rackStartTime){
rackStartTime=now
}

if(now-rackStartTime<4000){

instructions.innerText="Hold rack vertically"

}else{

phase="rotate"
instructions.innerText="Rotate phone horizontally"

}

}

// ---- ROTATE ----
else if(phase==="rotate"){

if(isLandscape()){

if(!rotateStartTime){
rotateStartTime=now
}

if(now-rotateStartTime>2000){

phase="scan"
scanStartTime=now

instructions.innerText="Move camera LEFT → RIGHT"

}

}else{

rotateStartTime=null

}

}

// ---- SCAN ----
else if(phase==="scan"){

if(paused){
requestAnimationFrame(update)
return
}

let elapsed=now-scanStartTime

if(elapsed<3000){

instructions.innerText="Scanning unit"

}else{

phase="waitpause"
instructions.innerText="Pause recording and move to next unit"

}

}

// ---- WAIT FOR PAUSE ----
else if(phase==="waitpause"){

// waiting for user pause

}

requestAnimationFrame(update)

}

update()

</script>
</body>
</html>
